<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- паттерн (сеточка + кресты) -->
    <pattern id="pattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="#0e0e10"/>
      
      <!-- линии -->
      <path d="M0 30 H60 M30 0 V60"
            stroke="#ffffff"
            stroke-opacity="0.05"
            stroke-width="1"/>

      <!-- крест -->
      <path d="M25 25 L35 35 M35 25 L25 35"
            stroke="#ffffff"
            stroke-opacity="0.08"
            stroke-width="1.5"/>
    </pattern>

    <!-- лёгкий шум -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- фон -->
  <rect width="100%" height="100%" fill="#0e0e10"/>

  <!-- узор -->
  <rect width="100%" height="100%" fill="url(#pattern)"/>

  <!-- шум поверх -->
  <rect width="100%" height="100%" filter="url(#noise)"/>

</svg>