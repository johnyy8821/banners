<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- основной паттерн (сетка + блоки) -->
    <pattern id="gridPattern" width="80" height="80" patternUnits="userSpaceOnUse">
      
      <!-- фон ячейки -->
      <rect width="80" height="80" fill="#0c0c0f"/>

      <!-- тонкая сетка -->
      <path d="M0 0 H80 M0 0 V80"
            stroke="#ffffff"
            stroke-opacity="0.04"
            stroke-width="1"/>

      <!-- внутренние линии -->
      <path d="M0 40 H80 M40 0 V80"
            stroke="#ffffff"
            stroke-opacity="0.025"
            stroke-width="1"/>

      <!-- маленькие квадраты -->
      <rect x="10" y="10" width="6" height="6"
            fill="#ffffff"
            fill-opacity="0.06"/>

      <rect x="64" y="20" width="4" height="4"
            fill="#ffffff"
            fill-opacity="0.05"/>

      <rect x="30" y="55" width="5" height="5"
            fill="#ffffff"
            fill-opacity="0.04"/>

      <!-- L-образные углы -->
      <path d="M5 20 V5 H20"
            stroke="#ffffff"
            stroke-opacity="0.06"
            stroke-width="1.2"
            fill="none"/>

      <path d="M75 60 V75 H60"
            stroke="#ffffff"
            stroke-opacity="0.05"
            stroke-width="1.2"
            fill="none"/>

    </pattern>

    <!-- лёгкий шум -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.035"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- фон -->
  <rect width="100%" height="100%" fill="#0c0c0f"/>

  <!-- паттерн -->
  <rect width="100%" height="100%" fill="url(#gridPattern)"/>

  <!-- шум -->
  <rect width="100%" height="100%" filter="url(#noise)"/>

</svg>